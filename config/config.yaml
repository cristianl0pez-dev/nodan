scanner:
  masscan:
    rate: 10000
    wait: 10
    retries: 3
  nmap:
    timing: T4
    scripts: default,banner
    timeout: 30s

database:
  elasticsearch:
    hosts:
      - http://elasticsearch:9200
    index: nodan
    username: ""
    password: ""

geolocation:
  city_db: data/GeoLite2-City/GeoLite2-City.mmdb
  asn_db: data/GeoLite2-ASN/GeoLite2-ASN.mmdb

api:
  host: 0.0.0.0
  port: 8000
  title: "Nodan API"
  version: "1.0.0"

cli:
  api_url: http://localhost:8000
  default_limit: 100
  max_limit: 1000
