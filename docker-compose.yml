version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: nodan-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nodan

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nodan-api
    ports:
      - "8000:8000"
    environment:
      - NODAN_API_URL=http://localhost:8000
      - NODAN_CONFIG=/app/config/config.yaml
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - nodan

networks:
  nodan:
    driver: bridge

volumes:
  elasticsearch_data:
